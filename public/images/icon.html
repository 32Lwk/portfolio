<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Y Icon</title>
    <style>
      body {
        margin: 0;
        background: #111827;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .icon {
        width: 320px; /* 仕上がりをきれいにするため大きめに描画 */
        height: 320px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
        border-radius: 60px; /* 32px版の borderRadius: 6 をスケール */
        font-size: 180px;     /* 32px版の fontSize: 18 をスケール */
        font-weight: 700;
        color: white;
        font-family: system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="icon">Y</div>
  </body>
</html>
